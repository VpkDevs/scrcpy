plugins {
    id 'com.android.application'
}

android {
    namespace 'com.duplex.reverseview'
    compileSdk 34

    defaultConfig {
        applicationId 'com.duplex.reverseview'
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName '0.1-duplex'
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
}
